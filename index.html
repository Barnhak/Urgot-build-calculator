<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urgot — Build Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C89B3C; --gold-light: #F0E6B2; --gold-dark: #785A28;
      --bg: #010A13; --bg-surface: #0A1428; --bg-card: #0D1B2E;
      --border: #1E3A5F; --border-gold: #785A28;
      --text: #C8AA6E; --text-dim: #5B5A56; --text-bright: #F0E6B2;
      --blue: #0BC4E3; --blue-dark: #0A3A4A;
      --red: #C84B4B; --red-dark: #2E0A0A;
      --purple: #9B59B6; --purple-dark: #1A0A2E;
      --orange: #E67E22; --orange-dark: #2E1A0A;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 16px;
      min-height: 100vh; padding: 2rem 1rem 3rem;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(200,155,60,0.07) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(30,58,95,0.1) 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(30,58,95,0.1) 50px);
    }
    .container { max-width: 820px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.5s ease both; }
    .logo-line { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 4px; }
    .logo-line::before, .logo-line::after { content: ''; height: 1px; width: 70px; background: linear-gradient(90deg, transparent, var(--gold-dark)); }
    .logo-line::after { background: linear-gradient(90deg, var(--gold-dark), transparent); }
    h1 { font-family: 'Cinzel', serif; font-size: clamp(20px, 5vw, 28px); color: var(--gold); letter-spacing: 0.12em; }
    .subtitle { font-size: 13px; color: var(--text-dim); letter-spacing: 0.08em; margin-top: 4px; }
    .section {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1.5rem; margin-bottom: 1.25rem;
      position: relative; animation: fadeUp 0.4s ease both;
    }
    .section::before {
      content: ''; position: absolute; inset: 0; border-radius: 4px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(200,155,60,0.15), transparent 40%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none;
    }
    .section-title { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 1.25rem; }

    /* Input grid avec preview champion */
    .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .champ-preview {
      position: absolute; left: 6px; width: 26px; height: 26px;
      border-radius: 3px; overflow: hidden; border: 1px solid var(--border-gold);
      background: var(--bg-card); display: none;
      flex-shrink: 0;
    }
    .champ-preview img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .champ-preview.visible { display: block; }
    .input-group input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text-bright);
      font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 500;
      padding: 8px 10px; outline: none; transition: border-color 0.2s, box-shadow 0.2s, padding-left 0.15s;
    }
    .input-group input.has-icon { padding-left: 38px; }
    .input-group input:focus { border-color: var(--gold-dark); box-shadow: 0 0 0 2px rgba(200,155,60,0.1); }
    .input-group input::placeholder { color: var(--text-dim); font-weight: 400; }

    /* Tags */
    .comp-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .comp-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; align-items: center; }
    .tag { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; padding: 4px 12px; border-radius: 2px; }
    .tag-ad    { background: rgba(200,75,75,0.12);  color: #E07070; border: 1px solid rgba(200,75,75,0.3); }
    .tag-ap    { background: var(--purple-dark);    color: var(--purple); border: 1px solid rgba(155,89,182,0.3); }
    .tag-cc    { background: var(--blue-dark);      color: var(--blue);   border: 1px solid rgba(11,196,227,0.3); }
    .tag-crit  { background: rgba(200,155,60,0.1);  color: var(--gold);   border: 1px solid rgba(200,155,60,0.3); }
    .tag-burst { background: rgba(180,30,180,0.1);  color: #D070D0;       border: 1px solid rgba(180,30,180,0.3); }
    .tag-burn  { background: var(--orange-dark);    color: var(--orange); border: 1px solid rgba(230,126,34,0.3); }
    .tag-shield{ background: rgba(11,196,227,0.08); color: var(--blue);   border: 1px solid rgba(11,196,227,0.25);}
    .tag-heal  { background: rgba(30,164,122,0.08); color: #1EA47A;       border: 1px solid rgba(30,164,122,0.25);}
    .tag-empty { font-size: 12px; color: var(--text-dim); font-style: italic; }

    /* Bouton */
    .btn-wrap { text-align: center; margin-top: 1.25rem; }
    .btn {
      font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold); background: transparent;
      border: 1px solid var(--gold-dark); border-radius: 3px;
      padding: 11px 36px; cursor: pointer; position: relative; overflow: hidden; transition: color 0.2s;
    }
    .btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(200,155,60,0.12), transparent); opacity: 0; transition: opacity 0.2s; }
    .btn:hover { color: var(--gold-light); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(0.97); }

    /* Result headers */
    .result-header { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .result-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Runes */
    .rune-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.25rem; }
    .rune-path { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .rune-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .rune-pill { font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 2px; }
    .rune-keystone { background: rgba(200,155,60,0.12); color: var(--gold); border: 1px solid rgba(200,155,60,0.3); font-size: 14px; }
    .rune-primary { background: var(--blue-dark); color: var(--blue); border: 1px solid rgba(11,196,227,0.2); }
    .rune-secondary { background: var(--purple-dark); color: var(--purple); border: 1px solid rgba(155,89,182,0.25); }
    .divider { height: 1px; background: var(--border); margin: 10px 0; }

    /* Build layout 2 colonnes */
    .build-layout { display: grid; grid-template-columns: 1fr 220px; gap: 14px; align-items: start; }
    @media(max-width: 640px) { .build-layout { grid-template-columns: 1fr; } }

    /* Items */
    .items-grid { display: flex; flex-direction: column; gap: 8px; }
    .item-row {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 12px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s;
    }
    .item-row:hover { border-color: var(--border-gold); }
    .item-icon {
      width: 40px; height: 40px; border-radius: 4px; overflow: hidden;
      border: 1px solid var(--border-gold); flex-shrink: 0;
      background: var(--bg-card);
    }
    .item-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-slot { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.1em; color: var(--gold-dark); text-transform: uppercase; min-width: 48px; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text-bright); }
    .item-note { font-size: 12px; color: var(--text-dim); margin-top: 1px; line-height: 1.4; }

    /* Situationnel */
    .situ-panel {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1rem; position: relative;
      animation: fadeUp 0.4s ease both 0.15s;
    }
    .situ-panel::before {
      content: ''; position: absolute; inset: 0; border-radius: 4px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(200,155,60,0.1), transparent 40%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none;
    }
    .situ-title { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 10px; }
    .situ-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 3px;
      padding: 8px 10px; margin-bottom: 7px; transition: border-color 0.2s;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .situ-item:last-child { margin-bottom: 0; }
    .situ-item:hover { border-color: var(--border-gold); }
    .situ-icon { width: 36px; height: 36px; border-radius: 3px; overflow: hidden; border: 1px solid var(--border-gold); flex-shrink: 0; background: var(--bg-card); }
    .situ-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .situ-text { flex: 1; }
    .situ-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 2px; margin-bottom: 4px; letter-spacing: 0.06em; }
    .situ-tag-shield { background: rgba(11,196,227,0.1); color: var(--blue); border: 1px solid rgba(11,196,227,0.25); }
    .situ-tag-heal { background: rgba(30,164,122,0.1); color: #1EA47A; border: 1px solid rgba(30,164,122,0.25); }
    .situ-item-name { font-size: 13px; font-weight: 600; color: var(--text-bright); margin-bottom: 2px; }
    .situ-item-cond { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .situ-empty { font-size: 12px; color: var(--text-dim); font-style: italic; text-align: center; padding: 0.75rem 0; }

    /* Misc */
    .warn-box { background: rgba(200,155,60,0.07); border: 1px solid rgba(200,155,60,0.2); border-radius: 3px; padding: 8px 12px; font-size: 13px; color: var(--gold); margin-bottom: 8px; }
    .error { background: var(--red-dark); border: 1px solid rgba(200,75,75,0.3); border-radius: 3px; padding: 10px 14px; font-size: 13px; color: var(--red); text-align: center; margin-top: 1rem; }
    footer { text-align: center; margin-top: 2.5rem; font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    @media(max-width:500px) { .input-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line"><h1>Urgot · Build Calculator</h1></div>
    <p class="subtitle">Runes & build adaptatif selon la composition ennemie</p>
  </header>

  <div class="section">
    <p class="section-title">✦ Composition ennemie</p>
    <div class="input-grid">
      <div class="input-group">
        <label>Top (adversaire)</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-top"><img id="img-top" src="" alt="" /></div>
          <input id="top" placeholder="ex: Darius" list="list-top" autocomplete="off" oninput="onInput()" />
          <datalist id="list-top"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>Jungle</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-jg"><img id="img-jg" src="" alt="" /></div>
          <input id="jg" placeholder="ex: Lee Sin" list="list-jg" autocomplete="off" oninput="onInput()" />
          <datalist id="list-jg"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>Mid</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-mid"><img id="img-mid" src="" alt="" /></div>
          <input id="mid" placeholder="ex: Syndra" list="list-mid" autocomplete="off" oninput="onInput()" />
          <datalist id="list-mid"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>ADC</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-adc"><img id="img-adc" src="" alt="" /></div>
          <input id="adc" placeholder="ex: Jinx" list="list-adc" autocomplete="off" oninput="onInput()" />
          <datalist id="list-adc"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>Support</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-sup"><img id="img-sup" src="" alt="" /></div>
          <input id="sup" placeholder="ex: Thresh" list="list-sup" autocomplete="off" oninput="onInput()" />
          <datalist id="list-sup"></datalist>
        </div>
      </div>
    </div>
    <p class="comp-label">Analyse composition</p>
    <div class="comp-tags" id="comp-tags">
      <span class="tag-empty">Entrez les champions pour voir l'analyse…</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" onclick="calculate()">Générer le build</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <div id="results"></div>
  <footer>Non affilié à Riot Games &nbsp;·&nbsp; Urgot Build Calculator</footer>
</div>

  "Skarner":["CC","SHIELD"],"Smolder":["AD","CRIT","BURN"],
  "Sona":["CC","SHIELD","HEAL"],"Soraka":["HEAL"],"Swain":["AP","BURN","HEAL"],
  "Syndra":["AP","BURST"],"Tahm Kench":["CC","HEAL","AP","SHIELD"],
  "Taliyah":["AP","CC"],"Talon":["AD","BURST"],"Teemo":["AP","BURN"],
  "Thresh":["CC","SHIELD"],"Tristana":["AD","CRIT"],"Trundle":["AD","HEAL"],
  "Tryndamere":["AD","CRIT","HEAL"],"Twisted Fate":["AP","CC"],"Twitch":["AD","CRIT"],
  "Udyr":["AP","AD","CC","HEAL","SHIELD"],"Varus":["AD","AP","BURST"],
  "Vayne":["AD"],"Veigar":["AP","BURST"],"Vel'Koz":["AP","BURST"],
  "Vi":["AD","CC","SHIELD"],"Viego":["AD","HEAL"],"Viktor":["AP","BURN","SHIELD"],
  "Vladimir":["AP","BURN","HEAL"],"Volibear":["CC","AP","HEAL","SHIELD"],
  "Warwick":["AD","HEAL"],"Wukong":["AD"],"Xayah":["AD","CRIT"],
  "Xerath":["AP","BURST"],"Xin Zhao":["AD","HEAL"],"Yasuo":["AD","CRIT","SHIELD"],
  "Yone":["AD","CRIT","SHIELD"],"Yorick":["AD","HEAL"],"Yunara":["AD","AP","CRIT"],
  "Yuumi":["HEAL","SHIELD"],"Zaahen":["AD","HEAL"],"Zac":["CC","AP","HEAL"],
  "Zed":["AD","BURST"],"Zeri":["AD","CRIT"],"Ziggs":["AP","BURST"],
  "Zilean":["AP","CC"],"Zoe":["AP","BURST"],"Zyra":["AP","BURN","CC"]
};

const BASE_URL = "https://barnhak.github.io/Urgot-build-calculator/";

const RUNE_PAGES = {
  page1: { label:"Standard",     img:"rune-page1.png" },
  page2: { label:"Cut Down",     img:"rune-page2.png" },
  page3: { label:"Tanks",        img:"rune-page3.png" },
  page4: { label:"Résolution",   img:"rune-page4.png" },
  page5: { label:"Rumble",       img:"rune-page5.png" },
  page6: { label:"Olaf",         img:"rune-page6.png" },
  page7: { label:"Heimerdinger", img:"rune-page7.png" },
  page8: { label:"Yorick",       img:"rune-page8.png" },
};

const CHAMP_RUNE_MAP = {
  "aatrox":"page2","darius":"page2","aurora":"page2","irelia":"page2","varus":"page2","vayne":"page2","vladimir":"page2",
  "ornn":"page3","malphite":"page3","dr. mundo":"page3","cho'gath":"page3","zac":"page3","tahm kench":"page3","k'sante":"page3","maokai":"page3",
  "renekton":"page4","shen":"page4",
  "rumble":"page5","olaf":"page6","heimerdinger":"page7","yorick":"page8"
};

const BRAMBLE_CHAMPS  = ["irelia","fiora","warwick","wukong"];
const BOOTS_FIRST     = ["olaf"];
const ABATTEUR_CHAMPS = ["garen","k'sante","yorick"];

// Init datalists
Object.entries(CHAMPS_BY_ROLE).forEach(([role, list]) => {
  const dl = document.getElementById('list-' + role);
  if (dl) list.forEach(c => { const o = document.createElement('option'); o.value = c; dl.appendChild(o); });
});

function getChamps() {
  return ['top','jg','mid','adc','sup'].map(id => document.getElementById(id).value.trim());
}

function getTags(name) {
  if (!name) return [];
  const key = Object.keys(CHAMP_TAGS).find(k => k.toLowerCase() === name.toLowerCase());
  return key ? CHAMP_TAGS[key] : [];
}

function analyzeComp(champs) {
  let ad=0,ap=0,cc=0,crit=0,burst=0,burn=0,shield=0,heal=0;
  champs.filter(Boolean).forEach(c => {
    const t = getTags(c);
    if (t.includes("AD"))     ad++;
    if (t.includes("AP"))     ap++;
    if (t.includes("CC"))     cc++;
    if (t.includes("CRIT"))   crit++;
    if (t.includes("BURST"))  burst++;
    if (t.includes("BURN"))   burn++;
    if (t.includes("SHIELD")) shield++;
    if (t.includes("HEAL"))   heal++;
  });
  return { ad,ap,cc,crit,burst,burn,shield,heal };
}

// Met à jour le preview champion sur un champ
function updateChampPreview(role) {
  const val = document.getElementById(role).value.trim();
  const prev = document.getElementById('prev-' + role);
  const img  = document.getElementById('img-' + role);
  const input = document.getElementById(role);
  // Cherche si le nom correspond à un champion connu
  const known = Object.keys(CHAMP_TAGS).find(k => k.toLowerCase() === val.toLowerCase());
  if (known) {
    img.src = champImg(known);
    img.onerror = () => { prev.classList.remove('visible'); input.classList.remove('has-icon'); };
    prev.classList.add('visible');
    input.classList.add('has-icon');
  } else {
    prev.classList.remove('visible');
    input.classList.remove('has-icon');
  }
}

function onInput() {
  ['top','jg','mid','adc','sup'].forEach(updateChampPreview);
  const champs = getChamps();
  if (!champs.some(Boolean)) {
    document.getElementById('comp-tags').innerHTML = '<span class="tag-empty">Entrez les champions pour voir l\'analyse…</span>';
    return;
  }
  const a = analyzeComp(champs);
  const tags = [];
  if (a.ad > 0)     tags.push(`<span class="tag tag-ad">${a.ad} AD</span>`);
  if (a.ap > 0)     tags.push(`<span class="tag tag-ap">${a.ap} AP</span>`);
  if (a.cc >= 2)    tags.push(`<span class="tag tag-cc">CC</span>`);
  if (a.crit >= 2)  tags.push(`<span class="tag tag-crit">${a.crit} Crit</span>`);
  if (a.burst >= 2) tags.push(`<span class="tag tag-burst">Burst</span>`);
  if (a.burn >= 1)  tags.push(`<span class="tag tag-burn">Burn</span>`);
  if (a.shield >= 2)tags.push(`<span class="tag tag-shield">${a.shield} Boucliers</span>`);
  if (a.heal >= 2)  tags.push(`<span class="tag tag-heal">${a.heal} Heals</span>`);
  document.getElementById('comp-tags').innerHTML = tags.length ? tags.join('') : '<span class="tag-empty">Aucun profil particulier détecté</span>';
}

function getBoots(a) {
  if (a.ad >= 3 || a.crit >= 2) return { name:"Plated Steelcaps",  note:"Nombreux auto-attaquants / crit ennemis" };
  if (a.cc >= 2)                 return { name:"Mercury's Treads",   note:"Beaucoup de CC ennemis" };
  return                                { name:"Boots of Swiftness", note:"Situation standard — mobilité" };
}

function getSituItems(a) {
  const situ = [];
  if (a.shield >= 2) {
    situ.push({ tag:"shield", tagLabel:`${a.shield} Boucliers`, name:"Serpent's Fang", note:"Réduit les boucliers ennemis de 50% — remplace un item défensif" });
  }
  if (a.heal >= 2) {
    const isAD = a.ad >= a.ap;
    situ.push({
      tag:"heal", tagLabel:`${a.heal} Heals`,
      name: isAD ? "Thornmail" : "Chempunk Chainsword",
      note: isAD ? "Comp AD/tanks — Grievous Wounds sur auto-attaques reçues" : "Comp AP/burst — Grievous Wounds actif + passif"
    });
  }
  return situ;
}

function buildItems(top, a) {
  const n = (top||"").toLowerCase();
  const bootsFirst = BOOTS_FIRST.includes(n);
  const bramble    = BRAMBLE_CHAMPS.includes(n);
  const abatteur   = ABATTEUR_CHAMPS.includes(n);
  const boots = getBoots(a);
  const warnings = [];
  if (bootsFirst) warnings.push("⚡ Contre Olaf : achète les bottes en premier avant Black Cleaver");
  if (bramble)    warnings.push("🌿 Contre " + top + " : rush Bramble Vest avant Black Cleaver");
  if (abatteur)   warnings.push("⚔ Contre " + top + " : Abatteur possible avant Black Cleaver");

  const items = [];
  if (bootsFirst) {
    items.push({ slot:"Bottes", name:boots.name, note:boots.note });
    items.push({ slot:"Item 1", name:"Black Cleaver", note:"Core Urgot — réduction armure + santé" });
  } else {
    items.push({ slot:"Item 1", name:"Black Cleaver", note:"Core Urgot — réduction armure + santé" });
    items.push({ slot:"Bottes", name:boots.name, note:boots.note });
  }

  if (a.ad >= 3) items.push({ slot:"Item 2", name:"Deadman's Plate", note:"3+ champions AD — armure + engage" });
  else           items.push({ slot:"Item 2", name:"Sterak's Gage",   note:"Bouclier + résistances — standard" });

  if (a.ad >= 3) {
    if (a.crit >= 2) items.push({ slot:"Item 3", name:"Randuin's Omen",  note:"2+ crit ennemis — réduit les dégâts crit reçus" });
    else             items.push({ slot:"Item 3", name:"Sterak's Gage",    note:"Bouclier + résistances" });
  } else if (a.ap >= 2 || a.burn >= 1) {
    if (a.burn >= 1) items.push({ slot:"Item 3", name:"Force of Nature",  note:"AP + brûlure — mobilité et résistance magique" });
    else             items.push({ slot:"Item 3", name:"Rookern",           note:"Bouclier contre dégâts AP" });
  } else {
    items.push({ slot:"Item 3", name:"Deadman's Plate", note:"Armure + mobilité" });
  }

  const has = name => items.some(i => i.name === name);
  if (a.ad >= 3 && a.ap >= 2)      items.push({ slot:"Item 4", name:"Force of Nature",      note:"Couverture AP en complément anti-AD" });
  else if (a.ad >= 3)               items.push({ slot:"Item 4", name:"Jak'Sho, The Protean", note:"Résistances omnidirectionnelles" });
  else if (a.ap >= 2) {
    if (has("Force of Nature"))     items.push({ slot:"Item 4", name:"Rookern",               note:"Complément anti-AP" });
    else                            items.push({ slot:"Item 4", name:"Force of Nature",        note:"Mobilité sous dégâts AP" });
  } else                            items.push({ slot:"Item 4", name:"Jak'Sho, The Protean", note:"Résistances omnidirectionnelles" });

  const majoriteAP = a.ap >= 4;
  const mixte      = !majoriteAP && a.ap >= 2 && a.ad >= 2;
  if (majoriteAP && !has("Jak'Sho, The Protean"))  items.push({ slot:"Item 5", name:"Jak'Sho, The Protean", note:"Majorité AP — résistances magique + armure" });
  else if (mixte)                                   items.push({ slot:"Item 5", name:"Bloodmail",             note:"Composition mixte — conversion dégâts → santé" });
  else if (has("Jak'Sho, The Protean"))             items.push({ slot:"Item 5", name:"Bloodmail",             note:"Conversion dégâts → santé en prolonged fight" });
  else                                              items.push({ slot:"Item 5", name:"Jak'Sho, The Protean", note:"Résistances omnidirectionnelles" });

  return { items, warnings };
}

function itemRowHTML(item, i) {
  const img = itemImg(item.name);
  const iconHTML = img
    ? `<div class="item-icon"><img src="${img}" alt="${item.name}" loading="lazy" /></div>`
    : `<div class="item-icon" style="display:flex;align-items:center;justify-content:center;font-size:18px;">⚔</div>`;
  return `<div class="item-row" style="animation:fadeUp 0.3s ease both ${i*0.05}s">
    ${iconHTML}
    <div class="item-slot">${item.slot}</div>
    <div><div class="item-name">${item.name}</div><div class="item-note">${item.note}</div></div>
  </div>`;
}

function calculate() {
  const [top,jg,mid,adc,sup] = getChamps();
  if (!top) {
    document.getElementById('error-msg').innerHTML = '<div class="error">Renseigne au moins le champion top ennemi.</div>';
    return;
  }
  document.getElementById('error-msg').innerHTML = '';
  const a = analyzeComp([top,jg,mid,adc,sup]);
  const rune = RUNE_PAGES[CHAMP_RUNE_MAP[top.toLowerCase()] || "page1"];
  const { items, warnings } = buildItems(top, a);
  const situ = getSituItems(a);

  let html = '';

  // Runes
  html += `<div class="section" style="animation:fadeUp 0.4s ease both">
    <div class="result-header">Page de runes — ${rune.label}</div>
    <div class="rune-card" style="padding:0;overflow:hidden;background:transparent;border:none;">
      <img
        src="${BASE_URL}${rune.img}"
        alt="Page de runes ${rune.label}"
        style="width:100%;display:block;border-radius:4px;border:1px solid var(--border);"
        loading="lazy"
      />
    </div>
  </div>`;

  // Build + situationnel
  html += `<div class="build-layout">`;
  html += `<div class="section" style="animation:fadeUp 0.4s ease both 0.1s">
    <div class="result-header">Build recommandé</div>`;
  warnings.forEach(w => { html += `<div class="warn-box">${w}</div>`; });
  html += '<div class="items-grid">';
  items.forEach((item,i) => { html += itemRowHTML(item, i); });
  html += '</div></div>';

  // Panneau situationnel
  html += `<div class="situ-panel"><p class="situ-title">✦ Situationnel</p>`;
  if (!situ.length) {
    html += `<p class="situ-empty">Aucun item situationnel</p>`;
  } else {
    situ.forEach((s,i) => {
      const img = itemImg(s.name);
      const iconHTML = img
        ? `<div class="situ-icon"><img src="${img}" alt="${s.name}" loading="lazy" /></div>`
        : '';
      const tagClass = s.tag === 'shield' ? 'situ-tag-shield' : 'situ-tag-heal';
      html += `<div class="situ-item" style="animation-delay:${i*0.08}s">
        ${iconHTML}
        <div class="situ-text">
          <span class="situ-tag ${tagClass}">${s.tagLabel}</span>
          <div class="situ-item-name">${s.name}</div>
          <div class="situ-item-cond">${s.note}</div>
        </div>
      </div>`;
    });
  }
  html += `</div></div>`;

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').scrollIntoView({ behavior:'smooth', block:'start' });
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
