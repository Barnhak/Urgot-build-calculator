<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoL Build Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C89B3C;
      --gold-light: #F0E6B2;
      --gold-dark: #785A28;
      --bg: #010A13;
      --bg-surface: #0A1428;
      --bg-card: #0D1B2E;
      --border: #1E3A5F;
      --border-gold: #785A28;
      --text: #C8AA6E;
      --text-dim: #5B5A56;
      --text-bright: #F0E6B2;
      --blue: #0BC4E3;
      --blue-dark: #0A3A4A;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,155,60,0.08) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(30,58,95,0.15) 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(30,58,95,0.15) 50px);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 0.5rem;
    }

    .logo-line::before,
    .logo-line::after {
      content: '';
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--gold-dark));
    }
    .logo-line::after { background: linear-gradient(90deg, var(--gold-dark), transparent); }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(18px, 4vw, 26px);
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      position: relative;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s ease both 0.1s;
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(200,155,60,0.2), transparent 40%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      pointer-events: none;
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold-dark);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .roles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .role-slot label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .role-icon {
      width: 14px;
      height: 14px;
      display: inline-block;
      opacity: 0.6;
    }

    .role-slot input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-bright);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .role-slot input:focus {
      border-color: var(--gold-dark);
      box-shadow: 0 0 0 2px rgba(200,155,60,0.1);
    }

    .role-slot input::placeholder { color: var(--text-dim); font-weight: 400; }

    .btn-wrap { text-align: center; margin-top: 1.25rem; }

    .btn {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      background: transparent;
      border: 1px solid var(--gold-dark);
      border-radius: 3px;
      padding: 11px 32px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, background 0.2s;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,155,60,0.12), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover { color: var(--gold-light); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .loading {
      text-align: center;
      padding: 2rem 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading p {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .loading-bar {
      width: 120px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 0;
      overflow: hidden;
      position: relative;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      left: -40%;
      width: 40%;
      height: 100%;
      background: var(--gold);
      animation: slide 1s ease-in-out infinite;
    }

    @keyframes slide { to { left: 140%; } }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .error {
      background: rgba(180,30,30,0.1);
      border: 1px solid rgba(180,30,30,0.3);
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 13px;
      color: #E84141;
      text-align: center;
      margin-top: 1rem;
    }

    .synergy-box {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      animation: cardIn 0.4s ease both;
    }

    .synergy-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--gold-dark);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .synergy-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    .champ-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
      animation: cardIn 0.4s ease both;
      transition: border-color 0.2s;
    }

    .champ-card:hover { border-color: var(--border-gold); }

    .champ-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .champ-name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--gold);
    }

    .champ-role-tag {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .items-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .items-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .item-pill {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 2px;
      background: var(--blue-dark);
      color: var(--blue);
      border: 1px solid rgba(11,196,227,0.2);
      letter-spacing: 0.03em;
    }

    .item-pill:first-child {
      background: rgba(200,155,60,0.1);
      color: var(--gold);
      border-color: rgba(200,155,60,0.3);
    }

    .tip-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.55;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    footer a { color: var(--gold-dark); text-decoration: none; }

    @media (max-width: 480px) {
      .roles-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-line">
        <h1>Build Recommender</h1>
      </div>
      <p class="subtitle">League of Legends · Powered by Claude AI</p>
    </header>

    <div class="panel">
      <p class="panel-title">✦ Composition d'équipe</p>
      <div class="roles-grid">
        <div class="role-slot">
          <label>⚔ Top</label>
          <input id="c1" placeholder="ex: Darius" />
        </div>
        <div class="role-slot">
          <label>🌿 Jungle</label>
          <input id="c2" placeholder="ex: Lee Sin" />
        </div>
        <div class="role-slot">
          <label>✦ Mid</label>
          <input id="c3" placeholder="ex: Syndra" />
        </div>
        <div class="role-slot">
          <label>🏹 ADC</label>
          <input id="c4" placeholder="ex: Jinx" />
        </div>
        <div class="role-slot">
          <label>🛡 Support</label>
          <input id="c5" placeholder="ex: Thresh" />
        </div>
      </div>
      <div class="btn-wrap">
        <button class="btn" id="go-btn" onclick="getBuilds()">Analyser la composition</button>
      </div>
      <div id="error-msg"></div>
    </div>

    <div id="results"></div>

    <footer>
      Non affilié à Riot Games &nbsp;·&nbsp; Suggestions générées par IA
    </footer>
  </div>

  <script>
    document.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') getBuilds(); });
    });

    async function getBuilds() {
      const roles = ['Top','Jungle','Mid','ADC','Support'];
      const ids = ['c1','c2','c3','c4','c5'];
      const champs = ids.map((id, i) => ({
        role: roles[i],
        name: document.getElementById(id).value.trim()
      }));

      const missing = champs.filter(c => !c.name);
      if (missing.length > 0) {
        document.getElementById('error-msg').innerHTML = '<div class="error">Veuillez renseigner les 5 champions avant de continuer.</div>';
        return;
      }
      document.getElementById('error-msg').innerHTML = '';

      const btn = document.getElementById('go-btn');
      btn.disabled = true;

      document.getElementById('results').innerHTML = `
        <div class="loading">
          <p>Analyse en cours</p>
          <div class="loading-bar"></div>
        </div>`;

      const prompt = `Tu es un coach League of Legends expert patch actuel. Pour la composition suivante, fournis pour chaque champion :
- 6 objets recommandés dans l'ordre d'achat (commence par le mythique au slot 1)
- 1 conseil tactique court (1-2 phrases max)
Et une analyse de synergie globale de la team (2-3 phrases).

Composition :
${champs.map(c => `- ${c.role} : ${c.name}`).join('\n')}

Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks, structure exacte :
{
  "synergy": "...",
  "builds": [
    { "name": "...", "role": "...", "items": ["item1","item2","item3","item4","item5","item6"], "tip": "..." }
  ]
}`;

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }]
          })
        });
        const data = await res.json();
        const text = data.content.map(b => b.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        renderResults(parsed);
      } catch (e) {
        document.getElementById('results').innerHTML = '<div class="error">Erreur lors de la génération. Vérifiez les noms des champions et réessayez.</div>';
      }

      btn.disabled = false;
    }

    function renderResults(data) {
      let html = '';

      if (data.synergy) {
        html += `<div class="synergy-box">
          <p class="synergy-label">✦ Synergie d'équipe</p>
          <p class="synergy-text">${data.synergy}</p>
        </div>`;
      }

      for (let i = 0; i < data.builds.length; i++) {
        const b = data.builds[i];
        const delay = i * 0.07;
        html += `<div class="champ-card" style="animation-delay:${delay}s">
          <div class="champ-header">
            <span class="champ-name">${b.name}</span>
            <span class="champ-role-tag">${b.role}</span>
          </div>
          <p class="items-label">Objets recommandés</p>
          <div class="items-row">
            ${b.items.map(it => `<span class="item-pill">${it}</span>`).join('')}
          </div>
          <p class="tip-text">${b.tip}</p>
        </div>`;
      }

      document.getElementById('results').innerHTML = html;
    }
  </script>
</body>
</html>
