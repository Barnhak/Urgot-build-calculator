<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urgot — Build Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C89B3C; --gold-light: #F0E6B2; --gold-dark: #785A28;
      --bg: #010A13; --bg-surface: #0A1428; --bg-card: #0D1B2E;
      --border: #1E3A5F; --border-gold: #785A28;
      --text: #C8AA6E; --text-dim: #5B5A56; --text-bright: #F0E6B2;
      --blue: #0BC4E3; --blue-dark: #0A3A4A;
      --red: #C84B4B; --red-dark: #2E0A0A;
      --purple: #9B59B6; --purple-dark: #1A0A2E;
      --orange: #E67E22; --orange-dark: #2E1A0A;
      --green: #1EA47A; --green-dark: #0A2E1E;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 16px;
      min-height: 100vh; padding: 2rem 1rem 3rem;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(200,155,60,0.07) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(30,58,95,0.1) 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(30,58,95,0.1) 50px);
    }
    .container { max-width: 820px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.5s ease both; }
    .logo-line { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 4px; }
    .logo-line::before, .logo-line::after { content: ''; height: 1px; width: 70px; background: linear-gradient(90deg, transparent, var(--gold-dark)); }
    .logo-line::after { background: linear-gradient(90deg, var(--gold-dark), transparent); }
    h1 { font-family: 'Cinzel', serif; font-size: clamp(20px, 5vw, 28px); color: var(--gold); letter-spacing: 0.12em; }
    .subtitle { font-size: 13px; color: var(--text-dim); letter-spacing: 0.08em; margin-top: 4px; }
    .section {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1.5rem; margin-bottom: 1.25rem;
      position: relative; animation: fadeUp 0.4s ease both;
    }
    .section::before {
      content: ''; position: absolute; inset: 0; border-radius: 4px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(200,155,60,0.15), transparent 40%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none;
    }
    .section-title { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 1.25rem; }
    .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .champ-preview { position: absolute; left: 6px; width: 26px; height: 26px; border-radius: 3px; overflow: hidden; border: 1px solid var(--border-gold); background: var(--bg-card); display: none; flex-shrink: 0; }
    .champ-preview img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .champ-preview.visible { display: block; }
    .input-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text-bright); font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 500; padding: 8px 10px; outline: none; transition: border-color 0.2s, box-shadow 0.2s, padding-left 0.15s; }
    .input-group input.has-icon { padding-left: 38px; }
    .input-group input:focus { border-color: var(--gold-dark); box-shadow: 0 0 0 2px rgba(200,155,60,0.1); }
    .input-group input::placeholder { color: var(--text-dim); font-weight: 400; }
    .comp-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .comp-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; align-items: center; }
    .tag { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; padding: 4px 12px; border-radius: 2px; }
    .tag-ad     { background: rgba(200,75,75,0.12);  color: #E07070; border: 1px solid rgba(200,75,75,0.3); }
    .tag-ap     { background: var(--purple-dark);    color: var(--purple); border: 1px solid rgba(155,89,182,0.3); }
    .tag-cc     { background: var(--blue-dark);      color: var(--blue);   border: 1px solid rgba(11,196,227,0.3); }
    .tag-crit   { background: rgba(200,155,60,0.1);  color: var(--gold);   border: 1px solid rgba(200,155,60,0.3); }
    .tag-burst  { background: rgba(180,30,180,0.1);  color: #D070D0;       border: 1px solid rgba(180,30,180,0.3); }
    .tag-burn   { background: var(--orange-dark);    color: var(--orange); border: 1px solid rgba(230,126,34,0.3); }
    .tag-shield { background: rgba(11,196,227,0.08); color: var(--blue);   border: 1px solid rgba(11,196,227,0.25); }
    .tag-heal   { background: rgba(30,164,122,0.08); color: #1EA47A;       border: 1px solid rgba(30,164,122,0.25); }
    .tag-execute{ background: rgba(200,75,75,0.15);  color: #FF6060;       border: 1px solid rgba(200,75,75,0.4); }
    .tag-empty  { font-size: 12px; color: var(--text-dim); font-style: italic; }
    .btn-wrap { text-align: center; margin-top: 1.25rem; }
    .btn { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); background: transparent; border: 1px solid var(--gold-dark); border-radius: 3px; padding: 11px 36px; cursor: pointer; position: relative; overflow: hidden; transition: color 0.2s; }
    .btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(200,155,60,0.12), transparent); opacity: 0; transition: opacity 0.2s; }
    .btn:hover { color: var(--gold-light); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(0.97); }
    .result-header { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .result-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .build-layout { display: grid; grid-template-columns: 1fr 220px; gap: 14px; align-items: start; }
    @media(max-width: 640px) { .build-layout { grid-template-columns: 1fr; } }
    .items-grid { display: flex; flex-direction: column; gap: 8px; }
    .item-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s; }
    .item-row:hover { border-color: var(--border-gold); }
    .item-icon { width: 40px; height: 40px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border-gold); flex-shrink: 0; background: var(--bg-card); }
    .item-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-slot { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.1em; color: var(--gold-dark); text-transform: uppercase; min-width: 48px; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text-bright); }
    .item-note { font-size: 12px; color: var(--text-dim); margin-top: 1px; line-height: 1.4; }
    .situ-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; position: relative; animation: fadeUp 0.4s ease both 0.15s; }
    .situ-panel::before { content: ''; position: absolute; inset: 0; border-radius: 4px; border: 1px solid transparent; background: linear-gradient(135deg, rgba(200,155,60,0.1), transparent 40%) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none; }
    .situ-title { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 10px; }
    .situ-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px; margin-bottom: 7px; transition: border-color 0.2s; display: flex; align-items: flex-start; gap: 8px; }
    .situ-item:last-child { margin-bottom: 0; }
    .situ-item:hover { border-color: var(--border-gold); }
    .situ-icon { width: 36px; height: 36px; border-radius: 3px; overflow: hidden; border: 1px solid var(--border-gold); flex-shrink: 0; background: var(--bg-card); }
    .situ-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .situ-text { flex: 1; }
    .situ-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 2px; margin-bottom: 4px; letter-spacing: 0.06em; }
    .situ-tag-shield  { background: rgba(11,196,227,0.1);  color: var(--blue); border: 1px solid rgba(11,196,227,0.25); }
    .situ-tag-heal    { background: rgba(30,164,122,0.1);  color: #1EA47A;     border: 1px solid rgba(30,164,122,0.25); }
    .situ-tag-execute { background: rgba(200,75,75,0.15);  color: #FF6060;     border: 1px solid rgba(200,75,75,0.4); }
    .situ-item-name { font-size: 13px; font-weight: 600; color: var(--text-bright); margin-bottom: 2px; }
    .situ-item-cond { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .situ-empty { font-size: 12px; color: var(--text-dim); font-style: italic; text-align: center; padding: 0.75rem 0; }
    .warn-box { background: rgba(200,155,60,0.07); border: 1px solid rgba(200,155,60,0.2); border-radius: 3px; padding: 8px 12px; font-size: 13px; color: var(--gold); margin-bottom: 8px; }
    .guide-box { background: rgba(30,164,122,0.07); border: 1px solid rgba(30,164,122,0.25); border-radius: 3px; padding: 9px 14px; font-size: 13px; color: #1EA47A; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .guide-box a { color: #1EA47A; text-decoration: none; font-weight: 600; }
    .guide-box a:hover { text-decoration: underline; }
    .error { background: var(--red-dark); border: 1px solid rgba(200,75,75,0.3); border-radius: 3px; padding: 10px 14px; font-size: 13px; color: var(--red); text-align: center; margin-top: 1rem; }
    /* Catégories par champion */
    .cat-section { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; animation: fadeUp 0.4s ease both 0.2s; position: relative; }
    .cat-section::before { content: ''; position: absolute; inset: 0; border-radius: 4px; border: 1px solid transparent; background: linear-gradient(135deg, rgba(200,155,60,0.1), transparent 40%) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none; }
    .cat-grid { display: flex; flex-direction: column; gap: 8px; }
    .cat-row { display: flex; align-items: flex-start; gap: 10px; }
    .cat-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; min-width: 64px; padding-top: 5px; }
    .cat-label-ad     { color: #E07070; }
    .cat-label-ap     { color: var(--purple); }
    .cat-label-cc     { color: var(--blue); }
    .cat-label-crit   { color: var(--gold); }
    .cat-label-burst  { color: #D070D0; }
    .cat-label-burn   { color: var(--orange); }
    .cat-label-shield { color: var(--blue); }
    .cat-label-heal   { color: #1EA47A; }
    .cat-label-execute{ color: #FF6060; }
    .cat-champs { display: flex; flex-wrap: wrap; gap: 5px; }
    .cat-champ { display: flex; align-items: center; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 3px; padding: 3px 7px 3px 3px; font-size: 12px; color: var(--text-bright); }
    .cat-champ img { width: 20px; height: 20px; border-radius: 2px; object-fit: cover; object-position: center top; }
    footer { text-align: center; margin-top: 2.5rem; font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    @media(max-width:500px) { .input-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line"><h1>Urgot · Build Calculator</h1></div>
    <p class="subtitle">Adaptive runes & build based on enemy composition</p>
  </header>
  <div class="section">
    <p class="section-title">✦ Enemy Composition</p>
    <div class="input-grid">
      <div class="input-group">
        <label>Top (opponent)</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-top"><img id="img-top" src="" alt="" /></div>
          <input id="top" placeholder="ex: Darius" list="list-top" autocomplete="off" oninput="onInput()" />
          <datalist id="list-top"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>Jungle</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-jg"><img id="img-jg" src="" alt="" /></div>
          <input id="jg" placeholder="ex: Lee Sin" list="list-jg" autocomplete="off" oninput="onInput()" />
          <datalist id="list-jg"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>Mid</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-mid"><img id="img-mid" src="" alt="" /></div>
          <input id="mid" placeholder="ex: Syndra" list="list-mid" autocomplete="off" oninput="onInput()" />
          <datalist id="list-mid"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>ADC</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-adc"><img id="img-adc" src="" alt="" /></div>
          <input id="adc" placeholder="ex: Jinx" list="list-adc" autocomplete="off" oninput="onInput()" />
          <datalist id="list-adc"></datalist>
        </div>
      </div>
      <div class="input-group">
        <label>Support</label>
        <div class="input-wrap">
          <div class="champ-preview" id="prev-sup"><img id="img-sup" src="" alt="" /></div>
          <input id="sup" placeholder="ex: Thresh" list="list-sup" autocomplete="off" oninput="onInput()" />
          <datalist id="list-sup"></datalist>
        </div>
      </div>
    </div>
    <p class="comp-label">Team composition analysis</p>
    <div class="comp-tags" id="comp-tags">
      <span class="tag-empty">Enter enemy draft...</span>
    </div>
    <div class="btn-wrap">
      <button class="btn" onclick="calculate()">Generate build</button>
    </div>
    <div id="error-msg"></div>
  </div>
  <div id="results"></div>
  <footer>Not affiliated with Riot Games &nbsp;·&nbsp; Urgot Build Calculator</footer>
</div>
<script>
let DDV = "14.24.1";
const DDC = n => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/champion/${n}.png`;
const DDI = id => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/item/${id}.png`;
fetch("https://ddragon.leagueoflegends.com/api/versions.json")
  .then(r => r.json()).then(v => { DDV = v[0]; }).catch(() => {});

const GUIDE_BASE = "https://sites.google.com/view/urgot-beginner-guide/urgot/";

function champSlug(name) {
  return name.toLowerCase().replace(/['\u2019]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}

const CHAMP_DDR = {
  "Aurelion Sol":"AurelionSol","Bel'Veth":"Belveth","Cho'Gath":"Chogath",
  "Dr. Mundo":"DrMundo","Jarvan IV":"JarvanIV","Kai'Sa":"Kaisa",
  "Kha'Zix":"Khazix","K'Sante":"KSante","LeBlanc":"Leblanc",
  "Lee Sin":"LeeSin","Master Yi":"MasterYi","Miss Fortune":"MissFortune",
  "Nunu":"Nunu","Rek'Sai":"RekSai","Renata Glasc":"Renata",
  "Tahm Kench":"TahmKench","Twisted Fate":"TwistedFate","Vel'Koz":"Velkoz",
  "Wukong":"MonkeyKing","Xin Zhao":"XinZhao",
  "Naafiri":"Naafiri","Hwei":"Hwei","Smolder":"Smolder","Ambessa":"Ambessa",
  "Mel":"Mel","Yunara":"Yunara","Zaahen":"Zaahen"
};
function champImg(name) {
  const key = CHAMP_DDR[name] || name.replace(/['\s.]/g,'');
  return DDC(key);
}

const ITEM_IDS = {
  "Black Cleaver":3071,"Boots of Swiftness":3009,"Plated Steelcaps":3047,
  "Mercury's Treads":3111,"Sterak's Gage":3053,"Deadman's Plate":3742,
  "Randuin's Omen":3143,"Force of Nature":4401,"Rookern":222504,

function itemImg(name) { const id = ITEM_IDS[name]; return id ? DDI(id) : null; }

const CHAMPS_BY_ROLE = {
  top: ["Aatrox","Akali","Ambessa","Aurora","Camille","Cho'Gath","Darius","Dr. Mundo","Fiora","Garen","Gnar","Gragas","Gwen","Heimerdinger","Hwei","Illaoi","Irelia","Jax","Jayce","K'Sante","Kennen","Malphite","Maokai","Mordekaiser","Nasus","Olaf","Ornn","Pantheon","Poppy","Quinn","Renekton","Rengar","Rumble","Ryze","Sett","Shen","Singed","Sion","Smolder","Tahm Kench","Teemo","Tryndamere","Varus","Vayne","Vladimir","Volibear","Warwick","Wukong","Yasuo","Yone","Yorick","Zac","Zaahen"],

  mid: ["Ahri","Akali","Anivia","Annie","Aurelion Sol","Azir","Cassiopeia","Corki","Diana","Ekko","Fizz","Galio","Hwei","Irelia","Kassadin","Katarina","LeBlanc","Lissandra","Lux","Malzahar","Mel","Naafiri","Orianna","Pantheon","Qiyana","Ryze","Smolder","Swain","Syndra","Taliyah","Talon","Twisted Fate","Veigar","Vel'Koz","Viktor","Vladimir","Yasuo","Yone","Zed","Zoe","Zyra"],
  adc: ["Aphelios","Ashe","Caitlyn","Draven","Ezreal","Jhin","Jinx","Kai'Sa","Kalista","Kog'Maw","Lucian","Miss Fortune","Nilah","Samira","Sivir","Smolder","Swain","Tristana","Twitch","Varus","Vayne","Xayah","Yunara","Zeri","Ziggs"],
  sup: ["Alistar","Bard","Blitzcrank","Brand","Braum","Heimerdinger","Janna","Karma","Leona","Lulu","Lux","Maokai","Mel","Morgana","Nami","Nautilus","Pyke","Rakan","Renata Glasc","Senna","Seraphine","Sona","Soraka","Swain","Tahm Kench","Thresh","Vel'Koz","Xerath","Yuumi","Zilean","Zyra"]

// Tags: AD, AP, CRIT, BURST, BURN, SHIELD, HEAL, EXECUTE, BUMP(knockup/displacement sans tenacité)
// CC count: "1CC","2CC","3CC","5CC" = nombre de CC hard par champion

// Extrait le nombre de CC d'un champion (tag "1CC","2CC","3CC","5CC" → valeur numérique)
function getCCValue(tags) {
  for (var t of tags) {
    var m = t.match(/^(\d+)CC$/);
    if (m) return parseInt(m[1]);
  }
  return 0;
}

const BASE_URL = "https://barnhak.github.io/Urgot-build-calculator/";

  page1:{label:"Standard",img:"rune-page1.png"},
  page2:{label:"Cut Down",img:"rune-page2.png"},
  page3:{label:"Tanks",img:"rune-page3.png"},
  page4:{label:"Resolution",img:"rune-page4.png"},
  page5:{label:"Rumble",img:"rune-page5.png"},
  page6:{label:"Olaf",img:"rune-page6.png"},
  page7:{label:"Heimerdinger",img:"rune-page7.png"},
  page8:{label:"Yorick",img:"rune-page8.png"},
};

  "aatrox":"page2","darius":"page2","aurora":"page2","irelia":"page2","varus":"page2","vayne":"page2","vladimir":"page2",
  "ornn":"page3","malphite":"page3","dr. mundo":"page3","cho'gath":"page3","zac":"page3","tahm kench":"page3","k'sante":"page3","maokai":"page3",
  "renekton":"page4","shen":"page4",
  "rumble":"page5","olaf":"page6","heimerdinger":"page7","yorick":"page8"
};

const MERC_FIRST       = ["kennen"];
const STEELCAPS_FIRST  = ["ambessa","yasuo","tryndamere","gnar"];

const SHIELD_START     = ["teemo","rumble"];

Object.entries(CHAMPS_BY_ROLE).forEach(function(e) {
  var dl = document.getElementById('list-' + e[0]);
  if (dl) e[1].forEach(function(c) { var o = document.createElement('option'); o.value = c; dl.appendChild(o); });
});

function getChamps() {
  return ['top','jg','mid','adc','sup'].map(function(id) { return document.getElementById(id).value.trim(); });
}

function getTags(name) {
  if (!name) return [];
  var key = Object.keys(CHAMP_TAGS).find(function(k) { return k.toLowerCase() === name.toLowerCase(); });
  return key ? CHAMP_TAGS[key] : [];
}

function analyzeComp(champs) {
  var ad=0,ap=0,ccTotal=0,crit=0,burst=0,burn=0,shield=0,heal=0,execute=0;
  champs.filter(Boolean).forEach(function(c) {
    var t = getTags(c);
    if (t.includes("AD"))      ad++;
    if (t.includes("AP"))      ap++;
    if (t.includes("CRIT"))    crit++;
    if (t.includes("BURST"))   burst++;
    if (t.includes("BURN"))    burn++;
    if (t.includes("SHIELD"))  shield++;
    if (t.includes("HEAL"))    heal++;
    if (t.includes("EXECUTE")) execute++;
    ccTotal += getCCValue(t);
  });
  return { ad, ap, ccTotal, crit, burst, burn, shield, heal, execute };
}

function updateChampPreview(role) {
  var val = document.getElementById(role).value.trim();
  var prev = document.getElementById('prev-' + role);
  var img  = document.getElementById('img-' + role);
  var input = document.getElementById(role);
  var known = Object.keys(CHAMP_TAGS).find(function(k) { return k.toLowerCase() === val.toLowerCase(); });
  if (known) {
    img.src = champImg(known);
    img.onerror = function() { prev.classList.remove('visible'); input.classList.remove('has-icon'); };
    prev.classList.add('visible');
    input.classList.add('has-icon');
  } else {
    prev.classList.remove('visible');
    input.classList.remove('has-icon');
  }
}

function onInput() {
  ['top','jg','mid','adc','sup'].forEach(updateChampPreview);
  var champs = getChamps();
  if (!champs.some(Boolean)) {
    document.getElementById('comp-tags').innerHTML = '<span class="tag-empty">Enter enemy draft...</span>';
    return;
  }
  var a = analyzeComp(champs);
  var tags = [];
  if (a.ad > 0)       tags.push('<span class="tag tag-ad">' + a.ad + ' AD</span>');
  if (a.ap > 0)       tags.push('<span class="tag tag-ap">' + a.ap + ' AP</span>');
  if (a.ccTotal >= 2) tags.push('<span class="tag tag-cc">CC ' + a.ccTotal + '</span>');
  if (a.crit >= 1)    tags.push('<span class="tag tag-crit">' + a.crit + ' Crit</span>');
  if (a.burst >= 2)   tags.push('<span class="tag tag-burst">Burst</span>');
  if (a.burn >= 1)    tags.push('<span class="tag tag-burn">Burn</span>');
  if (a.shield >= 2)  tags.push('<span class="tag tag-shield">' + a.shield + ' Shields</span>');
  if (a.heal >= 2)    tags.push('<span class="tag tag-heal">' + a.heal + ' Heals</span>');
  if (a.execute >= 1) tags.push('<span class="tag tag-execute">Execute</span>');
  document.getElementById('comp-tags').innerHTML = tags.length ? tags.join('') : '<span class="tag-empty">No particular profile detected</span>';
}

function getBoots(a) {
  // 3+ AD → Steelcaps prioritaire même avec CC
  if (a.ad >= 3)                  return { name:"Plated Steelcaps",  note:"3+ AD -- armor priority" };
  // CC total >= 5 → Mercures forcés
  if (a.ccTotal >= 5)             return { name:"Mercury's Treads",  note:a.ccTotal + " CC total -- forced Tenacity" };
  // Crit ou beaucoup d'AD
  if (a.crit >= 1)                return { name:"Plated Steelcaps",  note:"Crit enemies" };
  // CC modéré
  if (a.ccTotal >= 2)             return { name:"Mercury's Treads",  note:"CC enemies" };
  return                                 { name:"Boots of Swiftness", note:"Standard -- mobility" };
}

function getSituItems(a) {
  var situ = [];
  if (a.shield >= 2) {
    situ.push({ tag:"shield", tagLabel:a.shield+" Shields", type:"single",
      items:[{ name:"Serpent's Fang", note:"Reduces enemy shields by 50% -- replace a defensive item" }]
    });
  }
  if (a.heal >= 2) {
    situ.push({ tag:"heal", tagLabel:a.heal+" Heals", type:"double",
      items:[
        { name:"Thornmail",           note:"AD/tank comp -- Grievous Wounds on incoming auto-attacks" },
        { name:"Chempunk Chainsword", note:"AP/burst comp -- Grievous Wounds active + passive" }
      ]
    });
  }
  if (a.execute >= 1) {
    situ.push({ tag:"execute", tagLabel:"Execute", type:"single",
      items:[{ name:"Sterak's Gage", note:"Shield absorbs execute thresholds -- stay alive at low HP" }]
    });
  }
  return situ;
}

function buildItems(top, a) {
  var n = (top||"").toLowerCase();
  var bootsFirst     = BOOTS_FIRST.includes(n);
  var mercFirst      = MERC_FIRST.includes(n);
  var steelcapsFirst = STEELCAPS_FIRST.includes(n);
  var bramble        = BRAMBLE_CHAMPS.includes(n);
  var abatteur       = ABATTEUR_CHAMPS.includes(n);
  var shieldStart    = SHIELD_START.includes(n);
  var boots = getBoots(a);
  var warnings = [];

  var startName = shieldStart ? "Doran's Shield" : "Doran's Blade";
  var startNote = shieldStart ? "vs " + top + " -- sustain against poke" : "Standard start -- damage + sustain";
  warnings.push("🛡 Start: " + startName + " -- " + startNote);

  if (bootsFirst)     warnings.push("⚡ vs Olaf: buy Boots of Swiftness first before Black Cleaver");
  if (mercFirst)      warnings.push("👟 vs " + top + ": rush Mercury's Treads before Black Cleaver");
  if (steelcapsFirst) warnings.push("🥾 vs " + top + ": rush Plated Steelcaps before Black Cleaver");
  if (bramble)        warnings.push("🌿 vs " + top + ": rush Bramble Vest before Black Cleaver");
  if (abatteur)       warnings.push("⚔ vs " + top + ": Serrated Edge possible before Black Cleaver");

  var items = [];
  if (bootsFirst) {
    items.push({ slot:"Boots",  name:"Boots of Swiftness", note:"Rush vs Olaf -- mobility" });
    items.push({ slot:"Item 1", name:"Black Cleaver",       note:"Core Urgot -- armor reduction + health" });
  } else if (mercFirst) {
    items.push({ slot:"Boots",  name:"Mercury's Treads",    note:"Rush vs Kennen -- CC reduction" });
    items.push({ slot:"Item 1", name:"Black Cleaver",       note:"Core Urgot -- armor reduction + health" });
  } else if (steelcapsFirst) {
    items.push({ slot:"Boots",  name:"Plated Steelcaps",    note:"Rush vs " + top + " -- block auto-attacks" });
    items.push({ slot:"Item 1", name:"Black Cleaver",       note:"Core Urgot -- armor reduction + health" });
  } else {
    items.push({ slot:"Item 1", name:"Black Cleaver",       note:"Core Urgot -- armor reduction + health" });
    items.push({ slot:"Boots",  name:boots.name,            note:boots.note });
  }

  if (a.ad >= 3) items.push({ slot:"Item 2", name:"Deadman's Plate", note:"3+ AD champions -- armor + engage" });
  else           items.push({ slot:"Item 2", name:"Sterak's Gage",   note:"Shield + resistances -- standard" });

  if (a.ad >= 3) {
    if (a.crit >= 1) items.push({ slot:"Item 3", name:"Randuin's Omen",  note:"Crit enemies -- reduces crit damage taken" });
    else             items.push({ slot:"Item 3", name:"Sterak's Gage",    note:"Shield + resistances" });
  } else if (a.ap >= 2 || a.burn >= 1) {
    if (a.burn >= 1) items.push({ slot:"Item 3", name:"Force of Nature",  note:"AP + burn -- mobility and magic resistance" });
    else             items.push({ slot:"Item 3", name:"Rookern",           note:"Shield against AP damage" });
  } else {
    items.push({ slot:"Item 3", name:"Deadman's Plate", note:"Armor + mobility" });
  }

  var has = function(name) { return items.some(function(i) { return i.name === name; }); };
  if (a.ad >= 3 && a.ap >= 2)      items.push({ slot:"Item 4", name:"Force of Nature",      note:"AP coverage alongside anti-AD" });
  else if (a.ad >= 3)               items.push({ slot:"Item 4", name:"Jak'Sho, The Protean", note:"Omnidirectional resistances" });
  else if (a.ap >= 2) {
    if (has("Force of Nature"))     items.push({ slot:"Item 4", name:"Rookern",               note:"Anti-AP complement" });
    else                            items.push({ slot:"Item 4", name:"Force of Nature",        note:"Mobility under AP damage" });
  } else                            items.push({ slot:"Item 4", name:"Jak'Sho, The Protean", note:"Omnidirectional resistances" });

  var majoriteAP = a.ap >= 4;
  var mixte      = !majoriteAP && a.ap >= 2 && a.ad >= 2;
  if (majoriteAP && !has("Jak'Sho, The Protean"))  items.push({ slot:"Item 5", name:"Jak'Sho, The Protean", note:"AP majority -- magic resistance + armor" });
  else if (mixte)                                   items.push({ slot:"Item 5", name:"Overlord's Bloodmail", note:"Mixed composition -- damage to health conversion" });
  else if (has("Jak'Sho, The Protean"))             items.push({ slot:"Item 5", name:"Overlord's Bloodmail", note:"Damage to health conversion in prolonged fights" });
  else                                              items.push({ slot:"Item 5", name:"Jak'Sho, The Protean", note:"Omnidirectional resistances" });

  return { items, warnings };
}

function itemRowHTML(item, i) {
  var img = itemImg(item.name);
  var iconHTML = img
    ? '<div class="item-icon"><img src="' + img + '" alt="' + item.name + '" loading="lazy"/></div>'
    : '<div class="item-icon" style="display:flex;align-items:center;justify-content:center;font-size:18px;">⚔</div>';
  return '<div class="item-row" style="animation:fadeUp 0.3s ease both ' + (i*0.05) + 's">'
    + iconHTML
    + '<div class="item-slot">' + item.slot + '</div>'
    + '<div><div class="item-name">' + item.name + '</div><div class="item-note">' + item.note + '</div></div>'
    + '</div>';
}

// Rendu de la section catégories par champion
function renderCategories(champs) {
  var CATS = [
    { key:"AD",      label:"AD",      cls:"cat-label-ad" },
    { key:"AP",      label:"AP",      cls:"cat-label-ap" },
    { key:"CC",      label:"CC",      cls:"cat-label-cc",     isCC:true },
    { key:"CRIT",    label:"Crit",    cls:"cat-label-crit" },
    { key:"BURST",   label:"Burst",   cls:"cat-label-burst" },
    { key:"BURN",    label:"Burn",    cls:"cat-label-burn" },
    { key:"SHIELD",  label:"Shield",  cls:"cat-label-shield" },
    { key:"HEAL",    label:"Heal",    cls:"cat-label-heal" },
    { key:"EXECUTE", label:"Execute", cls:"cat-label-execute" },
  ];

  var filled = champs.filter(Boolean).map(function(c) {
    var known = Object.keys(CHAMP_TAGS).find(function(k) { return k.toLowerCase() === c.toLowerCase(); });
    return known || null;
  }).filter(Boolean);

  if (!filled.length) return '';

  var rows = '';
  CATS.forEach(function(cat) {
    var matching = filled.filter(function(c) {
      var t = getTags(c);
      if (cat.isCC) return getCCValue(t) > 0;
      return t.includes(cat.key);
    });
    if (!matching.length) return;
    var champPills = matching.map(function(c) {
      return '<span class="cat-champ"><img src="' + champImg(c) + '" onerror="this.style.display=\'none\'" loading="lazy"/>' + c + '</span>';
    }).join('');
    rows += '<div class="cat-row"><span class="cat-label ' + cat.cls + '">' + cat.label + '</span><div class="cat-champs">' + champPills + '</div></div>';
  });

  if (!rows) return '';
  return '<div class="cat-section"><div class="result-header">Champion categories</div><div class="cat-grid">' + rows + '</div></div>';
}

function calculate() {
  var champs = getChamps();
  var top = champs[0];
  if (!top) {
    document.getElementById('error-msg').innerHTML = '<div class="error">Enter at least the enemy top champion.</div>';
    return;
  }
  document.getElementById('error-msg').innerHTML = '';

  var topKnown = Object.keys(CHAMP_TAGS).find(function(k) { return k.toLowerCase() === top.toLowerCase(); }) || top;
  var a = analyzeComp(champs);
  var rune = RUNE_PAGES[CHAMP_RUNE_MAP[top.toLowerCase()] || "page1"];
  var bi = buildItems(topKnown, a);
  var items = bi.items; var warnings = bi.warnings;
  var situ = getSituItems(a);
  var guideUrl = GUIDE_BASE + champSlug(topKnown);

  var html = '';

  // Runes
  html += '<div class="section" style="animation:fadeUp 0.4s ease both">'
    + '<div class="result-header">Rune page -- ' + rune.label + '</div>'
    + '<div style="padding:0;overflow:hidden;background:transparent;">'
    + '<img src="' + BASE_URL + rune.img + '" alt="Rune page ' + rune.label + '" style="width:100%;display:block;border-radius:4px;border:1px solid var(--border);" loading="lazy"/>'
    + '</div></div>';

  // Build + situationnel
  html += '<div class="build-layout">';
  html += '<div class="section" style="animation:fadeUp 0.4s ease both 0.1s">'
    + '<div class="result-header">Recommended build</div>'
    + '<div class="guide-box">📖 <a href="' + guideUrl + '" target="_blank" rel="noopener">Urgot vs ' + topKnown + ' -- Full matchup guide ↗</a></div>';
  warnings.forEach(function(w) { html += '<div class="warn-box">' + w + '</div>'; });
  html += '<div class="items-grid">';
  items.forEach(function(item, i) { html += itemRowHTML(item, i); });
  html += '</div></div>';

  // Panneau situationnel
  html += '<div class="situ-panel"><p class="situ-title">✦ Situational</p>';
  if (!situ.length) {
    html += '<p class="situ-empty">No situational items</p>';
  } else {
    situ.forEach(function(s, i) {
      var tagClass = 'situ-tag-' + s.tag;
      if (s.type === 'double') {
        html += '<div class="situ-item" style="animation-delay:' + (i*0.08) + 's;flex-direction:column;gap:6px;">'
          + '<span class="situ-tag ' + tagClass + '">' + s.tagLabel + '</span>';
        s.items.forEach(function(it, j) {
          var img = itemImg(it.name);
          var icon = img ? '<div class="situ-icon"><img src="' + img + '" alt="' + it.name + '" loading="lazy"/></div>' : '';
          if (j > 0) html += '<div style="height:5px;"></div>';
          html += '<div style="display:flex;align-items:flex-start;gap:8px;">' + icon
            + '<div><div class="situ-item-name">' + it.name + '</div><div class="situ-item-cond">' + it.note + '</div></div></div>';
        });
        html += '</div>';
      } else {
        var img2 = itemImg(s.items[0].name);
        var iconHTML = img2 ? '<div class="situ-icon"><img src="' + img2 + '" alt="' + s.items[0].name + '" loading="lazy"/></div>' : '';
        html += '<div class="situ-item" style="animation-delay:' + (i*0.08) + 's">'
          + iconHTML + '<div class="situ-text">'
          + '<span class="situ-tag ' + tagClass + '">' + s.tagLabel + '</span>'
          + '<div class="situ-item-name">' + s.items[0].name + '</div>'
          + '<div class="situ-item-cond">' + s.items[0].note + '</div>'
          + '</div></div>';
      }
    });
  }
  html += '</div></div>';

  // Catégories par champion
  html += renderCategories(champs);

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').scrollIntoView({ behavior:'smooth', block:'start' });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') calculate(); });
